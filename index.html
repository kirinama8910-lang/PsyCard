<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ПсиКарты — карта клиента</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #181c24;
      --bg-2: #1d2230;
      --panel: #1f2636;
      --panel-2: #232d3d;
      --panel-3: #283241;
      --input: #171d2a;
      --text: #d5dfe9;
      --text-soft: #8fa0b3;
      --text-faint: #5e7080;
      --line: rgba(255,255,255,0.07);
      --line-strong: rgba(255,255,255,0.12);
      --accent: #6f80e0;
      --accent-soft: rgba(111,128,224,0.14);
      --accent-strong: #94a2f2;
      --success: #6ab88a;
      --warning: #c8a44a;
      --danger: #c07878;
      --doc-bg: #21201a;
      --doc-line: #38342c;
      --doc-text: #c8bea8;
      --doc-soft: #8a8070;
      --doc-label: #a09688;
      --doc-head: #ddd0b8;
      --radius-xl: 22px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow-lg: 0 18px 40px rgba(0,0,0,0.30);
      --shadow-md: 0 10px 24px rgba(0,0,0,0.24);
      --transition: 180ms ease;
      --sidebar: 280px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(127,140,255,0.08), transparent 28%),
        linear-gradient(180deg, #0c1117 0%, #0f141a 100%);
      color: var(--text);
      overflow: hidden;
    }

    button, input, textarea, select { font: inherit; }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      height: 100vh;
      overflow: hidden;
      padding: 14px;
      gap: 14px;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 28px);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(23,31,41,0.97), rgba(19,26,34,0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
    }

    .brand {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .brand-row { display: flex; align-items: center; gap: 12px; }

    .brand-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #7080e0, #5a6cd4);
      color: white; font-weight: 800; font-size: 17px;
      box-shadow: 0 8px 16px rgba(111,128,224,0.18);
      flex-shrink: 0;
    }

    .brand-title { font-size: 17px; font-weight: 800; letter-spacing: -0.03em; margin: 0; }
    .brand-subtitle { margin-top: 2px; color: var(--text-soft); font-size: 11px; }

    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .btn-new-client {
      margin: 10px 12px 6px;
      width: calc(100% - 24px);
      min-height: 38px;
      border: 1px solid rgba(111,128,224,0.30);
      border-radius: 10px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .btn-new-client:hover {
      background: rgba(111,128,224,0.22);
      border-color: rgba(111,128,224,0.50);
    }

    .client-list {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 6px 10px;
    }

    .client-list::-webkit-scrollbar { width: 4px; }
    .client-list::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

    .client-item-wrap { position: relative; display: flex; align-items: stretch; margin-bottom: 6px; }

    .client-item {
      flex: 1;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
      color: var(--text);
      padding: 10px 12px;
      cursor: pointer;
      transition: var(--transition);
    }

    .client-item:hover { background: rgba(255,255,255,0.04); border-color: var(--line); }

    .client-item.active {
      background: linear-gradient(180deg, rgba(127,140,255,0.16), rgba(127,140,255,0.08));
      border-color: rgba(127,140,255,0.32);
    }

    .client-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }

    .client-meta {
      display: flex; gap: 6px; flex-wrap: wrap;
      color: var(--text-soft); font-size: 11px; line-height: 1.4;
    }

    .client-delete-btn {
      background: none; border: none; color: #c07878;
      font-size: 16px; padding: 0 8px; cursor: pointer;
      opacity: 0.6; flex-shrink: 0; border-radius: 0 14px 14px 0;
      transition: var(--transition);
    }
    .client-delete-btn:hover { opacity: 1; }

    .sidebar-footer {
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      padding: 8px 10px;
    }

    .settings-btn {
      width: 100%; min-height: 36px;
      background: none; border: none;
      color: var(--text-soft); font-size: 13px;
      cursor: pointer; border-radius: 10px;
      display: flex; align-items: center; gap: 8px;
      padding: 0 10px;
      transition: var(--transition);
    }

    .settings-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }

    /* ── Main work area (Page 1) ── */
    .page-main {
      height: calc(100vh - 28px);
      overflow-y: auto;
      border-radius: var(--radius-xl);
    }

    .page-main::-webkit-scrollbar { width: 6px; }
    .page-main::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 6px; }

    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%;
      color: var(--text-faint); font-size: 18px; font-weight: 600;
      letter-spacing: -0.01em;
      gap: 10px;
    }

    .empty-state-sub { font-size: 13px; font-weight: 400; color: var(--text-faint); }

    .work-area {
      display: flex; flex-direction: column;
      gap: 16px;
      padding: 20px;
      min-height: 100%;
    }

    .work-header {
      display: flex; align-items: center;
      gap: 12px; flex-wrap: wrap;
    }

    .work-client-name {
      margin: 0; font-size: 22px; font-weight: 800;
      letter-spacing: -0.03em;
    }

    .work-card-link {
      margin-left: auto;
      background: none; border: 1px solid var(--line);
      border-radius: 10px; color: var(--text-soft);
      font-size: 12px; font-weight: 600;
      padding: 0 12px; min-height: 32px;
      cursor: pointer; transition: var(--transition);
      display: inline-flex; align-items: center; gap: 6px;
    }

    .work-card-link:hover { border-color: var(--accent); color: var(--accent-strong); }

    .segmented {
      display: inline-flex; gap: 4px; padding: 4px;
      background: #191f2c;
      border: 1px solid var(--line); border-radius: 14px; flex-wrap: wrap;
    }

    .segment-btn {
      border: 0; background: transparent; color: var(--text-soft);
      min-height: 36px; padding: 0 14px; border-radius: 10px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: var(--transition);
    }

    .segment-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .segment-btn.active { background: rgba(127,140,255,0.18); color: #eef0ff; }

    .input, .select, .textarea {
      width: 100%; border: 1px solid var(--line);
      background: var(--input); color: var(--text);
      outline: none; transition: var(--transition);
    }

    .input, .select { height: 44px; border-radius: 12px; padding: 0 14px; }

    .textarea {
      min-height: 340px; border-radius: 16px;
      padding: 16px; resize: vertical;
      line-height: 1.72; font-size: 15px; letter-spacing: 0.005em;
    }

    .input::placeholder, .textarea::placeholder { color: var(--text-faint); }

    .input:focus, .textarea:focus, .select:focus {
      border-color: rgba(111,128,224,0.40);
      box-shadow: 0 0 0 4px rgba(111,128,224,0.10);
    }

    .action-bar {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }

    .btn {
      border: 1px solid transparent; border-radius: 12px;
      min-height: 42px; padding: 0 16px;
      cursor: pointer; transition: var(--transition);
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; font-size: 13px; font-weight: 700;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(180deg, #8a97ff, #707ff0);
      color: white; box-shadow: 0 8px 16px rgba(127,140,255,0.2);
    }

    .btn-secondary {
      background: #1a222c; color: var(--text); border-color: var(--line);
    }

    .btn-success {
      background: linear-gradient(180deg, #86d7a8, #69be8d); color: #112017;
    }

    .btn-warning {
      background: linear-gradient(180deg, #edce88, #dbb767); color: #30240c;
    }

    .btn-sm { min-height: 32px; padding: 0 12px; font-size: 12px; border-radius: 8px; }

    .parse-status {
      padding: 10px 14px; border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.025);
      font-size: 12px; color: var(--text-soft);
      line-height: 1.6;
    }

    .parse-status-time { color: var(--text-faint); margin-right: 8px; }
    .parse-status-ok { color: var(--success); }
    .parse-status-warn { color: var(--warning); }

    /* ── Page 2: Client Card ── */
    .page-card {
      position: fixed; inset: 0; z-index: 100;
      display: none;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .page-card.visible { display: flex; }

    .card-page-header {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(23,31,41,0.97), rgba(19,26,34,0.98));
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .card-page-title-block { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    .card-page-h1 {
      margin: 0; font-size: 20px; font-weight: 800;
      letter-spacing: -0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .card-tab-bar {
      display: flex; gap: 4px; padding: 10px 24px 0;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(23,31,41,0.97), rgba(19,26,34,0.98));
      flex-shrink: 0;
    }

    .card-tab-btn {
      border: 0; background: transparent;
      color: var(--text-soft); padding: 8px 16px 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: var(--transition);
    }

    .card-tab-btn:hover { color: var(--text); }
    .card-tab-btn.active { color: var(--accent-strong); border-bottom-color: var(--accent); }

    .card-content {
      flex: 1; overflow-y: auto; padding: 24px;
    }

    .card-content::-webkit-scrollbar { width: 6px; }
    .card-content::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 6px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .form-section { margin-bottom: 28px; }

    .form-section-title {
      font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-soft); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--line);
    }

    .form-grid-2 {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;
    }

    .form-field { margin-bottom: 12px; }

    .field-label {
      display: block; margin-bottom: 6px;
      color: var(--text-soft); font-size: 12px; font-weight: 600;
      letter-spacing: 0.02em;
    }

    .radio-group { display: flex; gap: 20px; align-items: center; margin-top: 4px; }

    .radio-group label {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; cursor: pointer; color: var(--text);
    }

    .radio-group input[type="radio"] { accent-color: var(--accent); cursor: pointer; }

    .card-footer {
      flex-shrink: 0; padding: 12px 24px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(23,31,41,0.97), rgba(19,26,34,0.98));
      display: flex; align-items: center; gap: 12px;
    }

    /* ── Implementation table ── */
    .impl-table-wrap {
      border: 1px solid var(--line); border-radius: 12px; overflow: hidden; margin-bottom: 10px;
    }

    .impl-table {
      width: 100%; border-collapse: collapse; table-layout: auto;
    }

    .impl-table th {
      background: rgba(0,0,0,0.20); color: var(--text-soft);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      font-weight: 800; padding: 8px 10px; text-align: left;
      border-bottom: 1px solid var(--line);
    }

    .impl-table td {
      border-bottom: 1px solid var(--line); padding: 0; vertical-align: middle;
    }

    .impl-table tr:last-child td { border-bottom: 0; }

    .impl-table th:not(:last-child), .impl-table td:not(:last-child) {
      border-right: 1px solid var(--line);
    }

    .impl-input {
      width: 100%; border: none; background: transparent;
      color: var(--text); padding: 8px 10px; font-size: 13px;
      outline: none; transition: background var(--transition);
    }

    .impl-input:focus { background: rgba(111,128,224,0.08); }

    /* ── Settings modal ── */
    .settings-modal {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.60);
    }

    .settings-modal.visible { display: flex; }

    .settings-box {
      background: linear-gradient(180deg, rgba(27,35,48,0.99), rgba(22,30,42,0.99));
      border: 1px solid var(--line-strong); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg); padding: 28px;
      width: 420px; max-width: calc(100vw - 32px);
    }

    .settings-box h2 { margin: 0 0 6px; font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .settings-box p { margin: 0 0 20px; color: var(--text-soft); font-size: 13px; line-height: 1.6; }

    /* ── Pill ── */
    .pill {
      display: inline-flex; align-items: center;
      min-height: 28px; padding: 0 10px; border-radius: 999px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.03);
      color: var(--text-soft); font-size: 11px; white-space: nowrap;
    }

    .pill-accent {
      background: var(--accent-soft); color: #dfe4ff;
      border-color: rgba(127,140,255,0.26);
    }

    .pill-success {
      background: rgba(126,211,159,0.12); color: #dcf7e5;
      border-color: rgba(126,211,159,0.24);
    }

    /* ── Toast ── */
    .toast {
      position: fixed; right: 18px; bottom: 18px; z-index: 300;
      min-width: 260px; max-width: 400px;
      background: rgba(24,30,40,0.98); color: var(--text);
      border: 1px solid var(--line-strong); box-shadow: var(--shadow-lg);
      border-radius: 14px; padding: 14px 16px; display: none;
    }

    .toast.show { display: block; }
    .toast-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .toast-text { font-size: 12px; line-height: 1.6; color: var(--text-soft); white-space: pre-wrap; }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: fixed; top: 14px; right: 14px; z-index: 200;
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--line-strong); background: var(--panel);
      color: var(--text); cursor: pointer;
      display: grid; place-items: center; font-size: 17px;
      box-shadow: var(--shadow-md); transition: var(--transition);
    }

    .theme-toggle:hover { transform: scale(1.08); }

    /* ── Scrollbar ── */
    .card-content::-webkit-scrollbar { width: 5px; }
    .card-content::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 5px; }

    /* ── Media ── */
    @media (max-width: 900px) {
      .app { grid-template-columns: 240px 1fr; padding: 10px; gap: 10px; }
      :root { --sidebar: 240px; }
    }

    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { height: auto; max-height: 38vh; }
      .page-main { height: auto; }
    }

    /* ══════════════════════════════════
       СВЕТЛАЯ ТЕМА — body:not(.dark)
       ══════════════════════════════════ */
    body:not(.dark) {
      color-scheme: light;
      --bg: #f8f7ff; --bg-2: #f0eeff;
      --panel: #ffffff; --panel-2: #f5f3ff; --panel-3: #ede9ff;
      --input: #ffffff;
      --text: #1a1a2e; --text-soft: #6b7280; --text-faint: #9ca3af;
      --line: rgba(0,0,0,0.08); --line-strong: rgba(0,0,0,0.14);
      --accent: #7c3aed; --accent-soft: rgba(124,58,237,0.10);
      --accent-strong: #9333ea;
      --success: #16a34a; --warning: #d97706; --danger: #dc2626;
      --shadow-lg: 0 18px 40px rgba(0,0,0,0.10);
      --shadow-md: 0 10px 24px rgba(0,0,0,0.08);
    }

    body:not(.dark) {
      background:
        radial-gradient(circle at top left, rgba(124,58,237,0.06), transparent 28%),
        linear-gradient(180deg, #f8f7ff 0%, #f0eeff 100%);
    }

    body:not(.dark) .sidebar {
      background: var(--panel);
      border-color: var(--line);
    }

    body:not(.dark) .client-item {
      background: rgba(0,0,0,0.01); color: var(--text);
    }

    body:not(.dark) .client-item:hover {
      background: rgba(124,58,237,0.05); border-color: rgba(124,58,237,0.16);
    }

    body:not(.dark) .client-item.active {
      background: linear-gradient(180deg, rgba(124,58,237,0.12), rgba(124,58,237,0.06));
      border-color: rgba(124,58,237,0.28);
    }

    body:not(.dark) .segmented { background: #ede9ff; border-color: rgba(124,58,237,0.15); }
    body:not(.dark) .segment-btn { color: var(--text-soft); }
    body:not(.dark) .segment-btn:hover { background: rgba(124,58,237,0.08); color: var(--text); }
    body:not(.dark) .segment-btn.active { background: rgba(124,58,237,0.16); color: #5b21b6; }

    body:not(.dark) .input,
    body:not(.dark) .select,
    body:not(.dark) .textarea {
      background: var(--input); color: var(--text); border-color: rgba(0,0,0,0.14);
    }

    body:not(.dark) .input:focus,
    body:not(.dark) .textarea:focus,
    body:not(.dark) .select:focus {
      border-color: rgba(124,58,237,0.40); box-shadow: 0 0 0 4px rgba(124,58,237,0.10);
    }

    body:not(.dark) .btn-primary {
      background: linear-gradient(180deg, #9333ea, #7c3aed);
      box-shadow: 0 8px 16px rgba(124,58,237,0.22);
    }

    body:not(.dark) .btn-secondary {
      background: #ffffff; color: var(--text); border-color: rgba(0,0,0,0.14);
    }

    body:not(.dark) .card-page-header,
    body:not(.dark) .card-tab-bar,
    body:not(.dark) .card-footer {
      background: var(--panel);
      border-color: var(--line);
    }

    body:not(.dark) .page-card { background: #f4f3ff; }

    body:not(.dark) .card-tab-btn.active { color: #6d28d9; border-bottom-color: #7c3aed; }

    body:not(.dark) .impl-input { color: var(--text); }
    body:not(.dark) .impl-input:focus { background: rgba(124,58,237,0.06); }

    body:not(.dark) .impl-table th { background: #f3f4f6; }
    body:not(.dark) .impl-table-wrap { background: #fff; }

    body:not(.dark) .toast {
      background: rgba(255,255,255,0.98); color: var(--text); border-color: var(--line-strong);
    }

    body:not(.dark) .settings-box {
      background: var(--panel); border-color: var(--line);
    }

    body:not(.dark) .btn-new-client {
      background: rgba(124,58,237,0.10); color: #7c3aed;
      border-color: rgba(124,58,237,0.25);
    }

    body:not(.dark) .btn-new-client:hover {
      background: rgba(124,58,237,0.18); border-color: rgba(124,58,237,0.45);
    }

    body:not(.dark) .parse-status {
      background: rgba(124,58,237,0.04); border-color: rgba(124,58,237,0.12);
    }
  </style>
</head>
<body>

  <!-- ══ PAGE 1: two-column app ══ -->
  <div class="app" id="appPage">

    <aside class="sidebar" aria-label="Список клиентов">
      <div class="brand">
        <div class="brand-row">
          <div class="brand-icon">Ψ</div>
          <div>
            <div class="brand-title">ПсиКарты</div>
            <div class="brand-subtitle">Карта клиента психолога</div>
          </div>
        </div>
      </div>

      <div class="sidebar-search">
        <input id="searchClientInput" class="input" type="text"
          placeholder="Поиск по имени или коду…" autocomplete="off" style="height:38px;" />
      </div>

      <button id="newClientBtn" class="btn-new-client">+ Новый клиент</button>

      <div id="clientList" class="client-list"></div>

      <div class="sidebar-footer">
        <button id="settingsBtn" class="settings-btn">⚙ Настройки</button>
      </div>
    </aside>

    /******************************************************************
     * УТИЛИТЫ (не трогать parseNoteFields, translitToId, isValidClientKey)
     ******************************************************************/
    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function showToast(title, text) {
      document.getElementById("toastTitle").textContent = title;
      document.getElementById("toastText").textContent  = text;
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 3400);
    }

    function getActiveClient() {
      return state.clients.find(c => c.id === state.activeClientId) || null;
    }

    function getFirstLine(text) { return (text || "").split("\n")[0].trim(); }

    function isValidClientKey(value) {
      return /^([А-Яа-яЁёA-Za-z\-]+)\s(\d{4})$/.test((value || "").trim());
    }

    function translitToId(clientKey) {
      const map = {
        а:"a",б:"b",в:"v",г:"g",д:"d",е:"e",ё:"e",ж:"zh",з:"z",и:"i",й:"y",
        к:"k",л:"l",м:"m",н:"n",о:"o",п:"p",р:"r",с:"s",т:"t",у:"u",ф:"f",
        х:"h",ц:"ts",ч:"ch",ш:"sh",щ:"sch",ъ:"",ы:"y",ь:"",э:"e",ю:"yu",я:"ya"
      };
      return clientKey.toLowerCase().split("")
        .map(c => map[c] ?? c).join("")
        .replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    }

    function formatTaskType(t) {
      return { intake_create_or_update:"первичный приём", session_update:"после встречи", client_plan_update:"план клиента" }[t] || t;
    }

    function parseNoteFields(noteText) {
      const lines = (noteText||"").split("\n").map(l=>l.trim()).filter(Boolean);
      const result = {};
      for (const line of lines.slice(1)) {
        const cleaned = line.replace(/^[-•\d.)\s]+/,"").trim();
        const parts = cleaned.split(":");
        if (parts.length >= 2) {
          const key = parts.shift().trim();
          const value = parts.join(":").trim();
          if (key && value) result[key] = value;
        }
      }
      return result;
    }

    /******************************************************************
     * LOCALSTORAGE
     ******************************************************************/
    function saveToLocalStorage() {
      try { localStorage.setItem("psy_clients", JSON.stringify(state.clients)); }
      catch(e) { console.warn("Ошибка записи:", e); }
    }

    function loadFromLocalStorage() {
      try {
        const saved = localStorage.getItem("psy_clients");
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            state.clients = parsed;
            return true;
          }
        }
      } catch(e) { console.warn("Ошибка чтения:", e); }
      return false;
    }

      const cardEl    = document.getElementById("pageCard");
      if (page === "client-card") {
        appEl.style.display = "none";
        cardEl.classList.add("visible");
        renderClientCard();
      } else {
        appEl.style.display = "grid";
        cardEl.classList.remove("visible");
        renderWorkArea();

    /******************************************************************
     * РЕНДЕР — СПИСОК КЛИЕНТОВ
     ******************************************************************/
    function renderClientList() {
      const list = document.getElementById("clientList");
      list.innerHTML = "";

      if (!state.filteredClients.length) {
        list.innerHTML = `<div class="client-item" style="cursor:default;">
          <div class="client-name">Ничего не найдено</div>
          <div class="client-meta">Попробуйте другой запрос</div>
        </div>`;
        return;
      }

      state.filteredClients.forEach(client => {
        const wrap = document.createElement("div");
        wrap.className = "client-item-wrap";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "client-item" + (client.id === state.activeClientId ? " active" : "");
        btn.innerHTML = `
          <div class="client-name">${escapeHtml(client.displayName)}</div>
          <div class="client-meta">
            <span>${escapeHtml(client.shortStatus)}</span>
            <span>Сессия: ${escapeHtml(client.lastSession || "—")}</span>
          </div>`;
        btn.addEventListener("click", () => {
          state.activeClientId = client.id;
          renderClientList();
          showPage("client-card");
        });

        const del = document.createElement("button");
        del.type = "button";
        del.className = "client-delete-btn";
        del.title = "Удалить клиента";
        del.textContent = "×";
        del.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (!confirm(`Удалить клиента «${client.displayName}»?`)) return;
          try {
            const res = await fetch(`${BASE_URL}/api/clients/${client.id}`, { method: "DELETE" });
            if (!res.ok) throw new Error(await res.text());
          } catch(_) {}
          state.clients = state.clients.filter(c => c.id !== client.id);
          if (state.activeClientId === client.id) state.activeClientId = null;
          saveToLocalStorage();
          renderAll();
        });

        wrap.appendChild(btn);
        wrap.appendChild(del);
        list.appendChild(wrap);
      });
    }

    /******************************************************************

      if (type === "textarea") {
        return `<div class="form-field">
          <label class="field-label" for="${id}">${escapeHtml(label)}</label>
          <textarea id="${id}" class="textarea" style="min-height:${rows * 38}px;" spellcheck="false">${escapeHtml(val || "")}</textarea>
        </div>`;
      }
      return `<div class="form-field">
        <label class="field-label" for="${id}">${escapeHtml(label)}</label>
        <input id="${id}" class="input" type="text" value="${escapeHtml(val || "")}" />
      </div>`;
    }

        <div class="form-section">
          <div class="form-section-title">ПЛАН РАБОТЫ — Этап ${n}</div>
          ${fld("cf-therapyPlan"+n,"План этапа "+n, c["therapyPlan"+n], "textarea", 4)}
          <div class="form-section-title" style="margin-top:14px">РЕАЛИЗАЦИЯ — Этап ${n}</div>
          ${renderImplTable(n, c.stages[n].implementation)}
        </div>`).join("");

      document.getElementById("tab-plan").innerHTML = `
        <div class="form-section">
          <div class="form-section-title">Гипотезы</div>
          ${fld("cf-hypotheses","Гипотезы терапевта", c.hypotheses, "textarea", 5)}
        </div>
        ${stagesHtml}`;

      // Кнопки добавления строк
      document.querySelectorAll(".btn-add-row").forEach(btn => {
        btn.addEventListener("click", () => {
          const stage = parseInt(btn.dataset.stage);
          collectImplFromDOM(stage, client.card);
          client.card.stages[stage].implementation.push({ date:"", topic:"", motiveExercise:"", noteObservation:"" });
          document.getElementById(`impl-body-${stage}`).innerHTML =
            renderImplRows(stage, client.card.stages[stage].implementation);
        });
      });
    }

    // Собрать таблицу реализации из DOM → в card.stages[stage]
    function collectImplFromDOM(stage, card) {
      document.querySelectorAll(`.impl-input[data-stage="${stage}"]`).forEach(inp => {
        const row = parseInt(inp.dataset.row);
        const col = inp.dataset.col;
        if (card.stages[stage].implementation[row]) {
          card.stages[stage].implementation[row][col] = inp.value;
        }
      });
    }

    // Собрать все данные формы → в client.card
    function collectCardFromPage2() {
      const client = getActiveClient();
      if (!client) return;
      const c = client.card;

      const g = (id) => document.getElementById(id)?.value ?? "";
      c.fullName           = g("cf-fullName");
      c.frequency          = g("cf-frequency");
      c.cost               = g("cf-cost");
      c.rules              = g("cf-rules");
      c.otherAgreements    = g("cf-otherAgreements");
      c.complaints         = g("cf-complaints");
      c.request            = g("cf-request");
      c.therapyTargets     = g("cf-therapyTargets");
      c.cardNotes          = g("cf-cardNotes");
      c.completionCriteria = g("cf-completionCriteria");
      c.personalityType    = g("cf-personalityType");
      c.education          = g("cf-education");
      c.family             = g("cf-family");
      c.chronicDiseases    = g("cf-chronicDiseases");
      c.psychiatrist       = g("cf-psychiatrist");
      c.father             = g("cf-father");
      c.mother             = g("cf-mother");
      c.siblings           = g("cf-siblings");
      c.children           = g("cf-children");
      c.biography          = g("cf-biography");
      c.hypotheses         = g("cf-hypotheses");
      for (let n = 1; n <= 5; n++) c["therapyPlan"+n] = g("cf-therapyPlan"+n);

      const genderRadio = document.querySelector('input[name="card-gender"]:checked');
      if (genderRadio) c.gender = genderRadio.value;

      for (let n = 1; n <= 5; n++) collectImplFromDOM(n, c);
    }

    /******************************************************************
     * РЕНДЕР ALL
     ******************************************************************/
    function renderAll() {
      const term = (document.getElementById("searchClientInput")?.value || "").trim().toLowerCase();
      state.filteredClients = state.clients.filter(cl => {
        const hay = [cl.displayName, cl.shortStatus, cl.id].join(" ").toLowerCase();
        return hay.includes(term);
      });
      renderClientList();
      renderWorkArea();
    }

    /******************************************************************
     * BACKEND API
     ******************************************************************/
    const BASE_URL = "http://127.0.0.1:8000";

    async function apiFetch(path, options = {}) {
      try {
        const res = await fetch(`${BASE_URL}${path}`, {
          headers: { "Content-Type": "application/json" }, ...options
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        return await res.json();
      } catch(e) {
        showToast("Ошибка сервера", e.message);
        return { ok: false, error: e.message };
      }
    }

    const backendApi = {
      async findOrCreateClientCard(p) { return apiFetch("/find-or-create-card",{ method:"POST",body:JSON.stringify(p) }); },
      async sendTextToLLM(p)          { return apiFetch("/send-to-llm",         { method:"POST",body:JSON.stringify(p) }); },
      async getPreview(p)             { return apiFetch("/get-preview",          { method:"POST",body:JSON.stringify(p) }); },
      async saveChanges(p)            { return apiFetch("/save-changes",         { method:"POST",body:JSON.stringify(p) }); },
      async createBackup(p)           { return apiFetch("/create-backup",        { method:"POST",body:JSON.stringify(p) }); },
      async downloadDocument(p) {
        window.open(`${BASE_URL}/download-document?client_id=${encodeURIComponent(p.activeClientId||"")}`, "_blank");
        return { ok: true };
      },
      async simulateAnalysis(p) { return apiFetch("/simulate-analysis",{ method:"POST",body:JSON.stringify(p) }); }
    };

    function collectPayload() {
      const client = getActiveClient();
      return {
        clientKey:      client ? client.displayName : "",
        taskType:       state.taskType,
        noteText:       document.getElementById("noteInput")?.value || "",
        activeClientId: state.activeClientId,
        card:           client ? client.card : null
      };
    }

    /******************************************************************
     * AI-РАЗБОР ЗАМЕТКИ → ПОЛЯ КАРТЫ
     ******************************************************************/
    const AI_FIELDS = [
      "fullName","gender","frequency","cost","rules","otherAgreements",
      "complaints","request","therapyTargets","cardNotes","completionCriteria",
      "personalityType","education","family","chronicDiseases","psychiatrist",
      "father","mother","siblings","children","biography","hypotheses","therapyPlan1"
    ];

    const AI_LABELS = {
      fullName:"ФИО", gender:"Пол", frequency:"Частота", cost:"Стоимость",
      rules:"Правила", otherAgreements:"Договорённости", complaints:"Жалобы",
      request:"Запрос", therapyTargets:"Мишени терапии", cardNotes:"Примечания",
      completionCriteria:"Критерии завершения", personalityType:"Тип личности",
      education:"Образование", family:"Состав семьи", chronicDiseases:"Хр. заболевания",
      psychiatrist:"Психиатр", father:"Отец", mother:"Мать", siblings:"Сиблинги",
      children:"Дети", biography:"Биография", hypotheses:"Гипотезы", therapyPlan1:"План 1 этап"
    };

    function applyParsedToCard(card, parsed, forceOverwrite, skipped) {
      for (const field of AI_FIELDS) {
        const val = parsed[field];
        if (!val || String(val).trim() === "") continue;
        if (!forceOverwrite && card[field] && String(card[field]).trim() !== "") {
          if (skipped) skipped.push(AI_LABELS[field] || field);
        } else {
          card[field] = val;
        }
      }
    }

    async function parseNoteWithAI() {
      const API_KEY = localStorage.getItem("anthropic_api_key") || "";
      if (!API_KEY) {
        showToast("Нет API ключа", "Укажите ключ Anthropic в Настройках (⚙ внизу панели).");
        return;
      }

      const client = getActiveClient();
      if (!client) { showToast("Клиент не выбран", "Выберите клиента из списка."); return; }

      const noteText = document.getElementById("noteInput")?.value || "";
      if (!noteText.trim()) { showToast("Пустая заметка", "Сначала введите текст заметки."); return; }

      // Второй клик — принудительная перезапись
      if (state.pendingParsed) {
        applyParsedToCard(client.card, state.pendingParsed, true, null);
        state.pendingParsed = null;
        client.lastSession = new Date().toLocaleDateString("ru-RU");
        saveToLocalStorage();
        renderAll();
        showToast("Готово", "Поля карты заменены принудительно.");
        updateParseStatus("Перезаписано принудительно", true);
        return;
      }

      const parseBtn = document.getElementById("parseNoteBtn");
      const origText = parseBtn.textContent;
      parseBtn.disabled = true;
      parseBtn.textContent = "Разбираем…";

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": API_KEY,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: "Ты помощник психолога. Получаешь свободную заметку о клиенте. Возвращаешь ТОЛЬКО валидный JSON без markdown и без пояснений. Если поле не найдено — пустая строка. Не придумывай то чего нет в тексте.",
            messages: [{
              role: "user",
              content: `Разбери заметку по полям карты:\n\n${noteText}\n\nВерни JSON с полями: fullName, gender (male|female|child), frequency, cost, rules, otherAgreements, complaints, request, therapyTargets, cardNotes, completionCriteria, personalityType, education, family, chronicDiseases, psychiatrist, father, mother, siblings, children, biography, hypotheses, therapyPlan1`
            }]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || response.statusText);
        }

        const data   = await response.json();
        const parsed = JSON.parse(data.content[0].text);

        const skipped = [];
        applyParsedToCard(client.card, parsed, false, skipped);

        client.lastSession = new Date().toLocaleDateString("ru-RU");
        saveToLocalStorage();
        renderAll();

        if (skipped.length > 0) {
          state.pendingParsed = parsed;
          showToast(
            "Некоторые поля уже заполнены",
            `Нажмите кнопку ещё раз чтобы заменить:\n${skipped.join(", ")}`
          );
          updateParseStatus(`Заполнено. Конфликт: ${skipped.join(", ")}. Повторный клик заменит.`, false);
        } else {
          state.pendingParsed = null;
          showToast("Готово", "Заметка разобрана по полям карты.");
          updateParseStatus("Разобрано успешно — все поля заполнены.", true);
        }

      } catch(err) {
        showToast("Ошибка разбора", err.message);
        updateParseStatus("Ошибка: " + err.message, false);
      } finally {
        parseBtn.disabled = false;
        parseBtn.textContent = origText;
      }
    }

    function updateParseStatus(text, ok) {
      const el = document.getElementById("parseStatus");
      const time = new Date().toLocaleTimeString("ru-RU", { hour:"2-digit", minute:"2-digit" });
      el.style.display = "block";
      el.innerHTML = `<span class="parse-status-time">${time}</span>
        <span class="${ok ? "parse-status-ok" : "parse-status-warn"}">${escapeHtml(text)}</span>`;
    }

    /******************************************************************
     * СОБЫТИЯ
     ******************************************************************/
    document.getElementById("searchClientInput").addEventListener("input", renderAll);

    document.querySelectorAll(".segment-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.taskType = btn.dataset.mode;
        state.pendingParsed = null;
        renderWorkArea();
      });
    });

    document.getElementById("voiceBtn").addEventListener("click", () => {
      showToast("Голос", "В разработке");
    });

    document.getElementById("parseNoteBtn").addEventListener("click", parseNoteWithAI);

    document.getElementById("buildPlanBtn").addEventListener("click", () => {
      showToast("Составить план терапии", "В разработке");
    });

    document.getElementById("saveNoteBtn").addEventListener("click", async () => {
      const client = getActiveClient();
      if (!client) { showToast("Клиент не выбран", "Выберите клиента из списка."); return; }
      const payload = collectPayload();
      await backendApi.createBackup(payload);
      await backendApi.saveChanges(payload);
      client.shortStatus = "Обновлена";
      saveToLocalStorage();
      renderAll();
      showToast("Сохранено", "Заметка сохранена.");
    });

    document.getElementById("clearNoteBtn").addEventListener("click", () => {
      document.getElementById("noteInput").value = "";
      state.pendingParsed = null;
      document.getElementById("parseStatus").style.display = "none";
      showToast("Очищено", "Рабочая заметка очищена.");
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
      backendApi.downloadDocument(collectPayload());
    });

    document.getElementById("backupBtn").addEventListener("click", async () => {
      await backendApi.createBackup(collectPayload());
      showToast("Резервная копия", "Готово к подключению файловой логики.");
    });

    document.getElementById("openCardBtn").addEventListener("click", () => {
      showPage("client-card");
    });

    // Страница 2 — назад
    document.getElementById("backBtn").addEventListener("click", () => {
      showPage("main");
    });

    // Страница 2 — переключение вкладок
    document.querySelectorAll(".card-tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".card-tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
      });
    });

    // Страница 2 — сохранить изменения
    document.getElementById("cardSaveBtn").addEventListener("click", () => {
      collectCardFromPage2();
      const client = getActiveClient();
      if (client) {
        client.lastSession = new Date().toLocaleDateString("ru-RU");
        client.shortStatus = "Обновлена";
      }
      saveToLocalStorage();
      renderClientList();
      const statusEl = document.getElementById("cardSaveStatus");
      statusEl.textContent = "Сохранено " + new Date().toLocaleTimeString("ru-RU", { hour:"2-digit", minute:"2-digit" });
      showToast("Карта сохранена", "Изменения записаны.");
    });

    // + Новый клиент
    document.getElementById("newClientBtn").addEventListener("click", () => {
      const name = prompt("Введите имя клиента (формат: Имя 1234):");
      if (!name) return;
      const trimmed = name.trim();
      if (!isValidClientKey(trimmed)) {
        showToast("Неверный формат", "Используйте формат «Имя 1234» (имя + 4 цифры).");
        return;
      }
      const existing = state.clients.find(c => c.displayName.toLowerCase() === trimmed.toLowerCase());
      if (existing) {
        state.activeClientId = existing.id;
        saveToLocalStorage();
        renderAll();
        showToast("Клиент найден", `Выбран: ${trimmed}`);
        return;
      }
      const newClient = {
        id:          translitToId(trimmed),
        displayName: trimmed,
        shortStatus: "Новая карта",
        lastSession: "—",
        card:        buildEmptyCard(trimmed)
      };
      state.clients.unshift(newClient);
      state.activeClientId = newClient.id;
      saveToLocalStorage();
      renderAll();
      showToast("Клиент создан", `Карта для «${trimmed}» готова.`);
    });

    // Настройки
    document.getElementById("settingsBtn").addEventListener("click", () => {
      const modal = document.getElementById("settingsModal");
      document.getElementById("apiKeyInput").value = localStorage.getItem("anthropic_api_key") || "";
      modal.classList.add("visible");
    });

    document.getElementById("saveSettingsBtn").addEventListener("click", () => {
      const key = document.getElementById("apiKeyInput").value.trim();
      if (key) localStorage.setItem("anthropic_api_key", key);
      else localStorage.removeItem("anthropic_api_key");
      document.getElementById("settingsModal").classList.remove("visible");
      showToast("Настройки сохранены", key ? "API ключ установлен." : "API ключ удалён.");
    });

    document.getElementById("closeSettingsBtn").addEventListener("click", () => {
      document.getElementById("settingsModal").classList.remove("visible");
    });

    document.getElementById("settingsModal").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove("visible");
    });

    /******************************************************************
     * ЗАГРУЗКА КЛИЕНТОВ С BACKEND
     ******************************************************************/
    async function loadClientsFromBackend() {
      try {
        const clients = await apiFetch("/clients");
        if (Array.isArray(clients) && clients.length > 0) {
          state.clients = clients;
          state.activeClientId = clients[0].id;
        }
      } catch(_) {}
    }

    /******************************************************************
     * BOOTSTRAP
     ******************************************************************/
    function bootstrap() {
      const hasLocal = loadFromLocalStorage();
      if (!hasLocal) {
        state.clients = JSON.parse(JSON.stringify(demoClients));
      }
      state.filteredClients = state.clients;
      if (state.clients.length > 0) state.activeClientId = state.clients[0].id;

      loadClientsFromBackend().catch(() => {}).finally(() => {
        renderAll();
      });
    }

    bootstrap();
  </script>
</body>
</html>
